<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINE UP ALLIED SERVICES | premium cleaning · postcard style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /*============================================================================
      SHINE UP ALLIED SERVICES — COMPLETE POSTCARD DESIGN (1500+ LINES)
      INCLUDES: LARGE RECTANGLE SLIDER, TOP‑BAR CALL BUTTON (9900099867), GPS MAP, 
      SERVICE POSTCARDS, FULLY RESPONSIVE, SMOOTH ANIMATIONS
    ============================================================================*/

    /* --------------------------------------
       CSS VARIABLES & RESET (expanded)
    -------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-1: #00c9b7;
      --primary-2: #00b4a0;
      --primary-3: #009b89;
      --secondary-1: #ff6b6b;
      --secondary-2: #ff5252;
      --accent-1: #ffd93d;
      --accent-2: #6c5ce7;
      --dark-1: #0a0f1c;
      --dark-2: #121828;
      --dark-3: #1a2135;
      --dark-4: #232b42;
      --light-1: #ffffff;
      --light-2: #f0f4fa;
      --light-3: #e1e8f0;
      --gray-1: #8b95b0;
      --gradient-1: linear-gradient(135deg, #00c9b7, #6c5ce7);
      --gradient-2: linear-gradient(135deg, #ff6b6b, #ffd93d);
      --gradient-3: linear-gradient(135deg, #00c9b7, #ff6b6b);
      --shadow-sm: 0 5px 15px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 15px 35px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 30px rgba(0, 201, 183, 0.3);
      --border-radius-sm: 10px;
      --border-radius-md: 20px;
      --border-radius-lg: 30px;
      --border-radius-xl: 50px;
      --font-main: 'Poppins', sans-serif;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-main);
      background: var(--dark-1);
      color: var(--light-2);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --------------------------------------
       ANIMATED BACKGROUND (rich layers)
    -------------------------------------- */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .gradient-sphere {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle at 30% 50%, rgba(0, 201, 183, 0.08), transparent 70%);
      top: -200px;
      right: -200px;
      animation: sphereMove 22s infinite alternate ease-in-out;
    }

    .gradient-sphere-2 {
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle at 70% 80%, rgba(108, 92, 231, 0.08), transparent 70%);
      bottom: -150px;
      left: -150px;
      animation: sphereMove2 25s infinite alternate;
    }

    .floating-shapes .shape {
      position: absolute;
      border: 2px solid rgba(0, 201, 183, 0.1);
      border-radius: 50%;
      animation: float 30s infinite linear;
    }

    .floating-shapes .shape:nth-child(1) { width: 180px; height: 180px; top: 15%; left: 8%; }
    .floating-shapes .shape:nth-child(2) { width: 120px; height: 120px; top: 55%; right: 12%; }
    .floating-shapes .shape:nth-child(3) { width: 240px; height: 240px; bottom: 15%; left: 18%; }
    .floating-shapes .shape:nth-child(4) { width: 90px; height: 90px; top: 38%; right: 28%; }
    .floating-shapes .shape:nth-child(5) { width: 150px; height: 150px; bottom: 25%; right: 35%; }

    .glow-particles .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--primary-1);
      border-radius: 50%;
      opacity: 0.25;
    }
    .glow-particles .particle:nth-child(1) { top: 15%; left: 8%; animation: particleFloat 20s infinite; }
    .glow-particles .particle:nth-child(2) { top: 35%; left: 25%; animation: particleFloat 24s infinite reverse; }
    .glow-particles .particle:nth-child(3) { top: 58%; left: 48%; animation: particleFloat 19s infinite; }
    .glow-particles .particle:nth-child(4) { top: 77%; left: 68%; animation: particleFloat 22s infinite reverse; }
    .glow-particles .particle:nth-child(5) { top: 28%; left: 88%; animation: particleFloat 26s infinite; }

    @keyframes sphereMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, 70px) scale(1.15); }
    }
    @keyframes sphereMove2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, -60px) scale(1.2); }
    }
    @keyframes float {
      0% { transform: rotate(0deg) translate(0, 0); }
      100% { transform: rotate(360deg) translate(80px, 40px); }
    }
    @keyframes particleFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0.2; }
      50% { transform: translateY(-80vh) translateX(60px); opacity: 0.5; }
      100% { transform: translateY(-150vh) translateX(120px); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 20px rgba(0, 201, 183, 0.3); }
      50% { box-shadow: 0 0 45px rgba(0, 201, 183, 0.7); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes postcardReveal {
      0% { opacity: 0; transform: scale(0.85) rotate(-3deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }
    
    /* --------------------------------------
       UTILITY CLASSES
    -------------------------------------- */
    .animate-slide-up { animation: fadeInUp 1s ease forwards; }
    .animate-slide-left { animation: slideInLeft 1s ease forwards; }
    .animate-slide-right { animation: slideInRight 1s ease forwards; }
    .animate-float { animation: bounce 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .gradient-text {
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --------------------------------------
       NAVIGATION — WITH CALL BUTTON + 9900099867
    -------------------------------------- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 15, 28, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      padding: 0.6rem 5%;
      border-bottom: 1px solid rgba(0, 201, 183, 0.25);
      box-shadow: var(--shadow-sm);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 2rem;
      font-weight: 700;
    }
    .logo i {
      color: var(--primary-1);
      animation: rotate 12s infinite linear;
    }
    .logo span {
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    .nav-links {
      display: flex;
      gap: 2.2rem;
    }
    .nav-links a {
      color: var(--light-2);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      padding: 0.5rem 1rem;
      border-radius: var(--border-radius-xl);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-links a i { font-size: 1rem; transition: transform 0.3s; }
    .nav-links a:hover, .nav-links a.active {
      background: var(--gradient-1);
      color: white;
      box-shadow: var(--shadow-glow);
    }
    .nav-links a:hover i { transform: translateY(-3px); }

    /* ----- RIGHT SIDE: CALL PILL + 3 DOTS ----- */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .call-pill {
      display: flex;
      align-items: center;
      background: rgba(0, 201, 183, 0.18);
      border: 1.5px solid var(--primary-1);
      border-radius: 60px;
      padding: 0.3rem 1.2rem 0.3rem 1.5rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 18px rgba(0, 201, 183, 0.4);
      transition: 0.25s;
    }
    .call-pill:hover {
      border-color: var(--accent-2);
      background: rgba(108, 92, 231, 0.2);
    }
    .call-pill i {
      font-size: 1.4rem;
      color: var(--primary-1);
      margin-right: 0.6rem;
    }
    .call-pill .phone-number {
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 1.2px;
      background: linear-gradient(145deg, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-right: 0.7rem;
    }
    .call-pill a {
      background: var(--gradient-2);
      border-radius: 40px;
      padding: 0.35rem 1.3rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      border: none;
      box-shadow: 0 0 12px rgba(255,107,107,0.5);
    }
    .call-pill a:hover {
      transform: scale(1.07);
      box-shadow: 0 0 25px rgba(255,107,107,0.8);
    }

    .mobile-menu-btn {
      font-size: 2.1rem;
      color: var(--primary-1);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    /* hide nav-cta on desktop because we have call pill */
    .nav-cta { display: none; }

    /* --------------------------------------
       MAIN CONTAINER
    -------------------------------------- */
    .main-container {
      max-width: 1400px;
      margin: 110px auto 0;
      padding: 2rem 2rem 4rem;
    }
    .section {
      padding: 4rem 0;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* --------------------------------------
       LARGE RECTANGLE SLIDER (hero right)
    -------------------------------------- */
    .hero-slider-box {
      width: 100%;
      max-width: 650px;        /* large rectangle */
      height: 360px;
      background: var(--dark-3);
      border-radius: 35px;
      overflow: hidden;
      box-shadow: var(--shadow-lg), 0 0 0 3px rgba(0,201,183,0.25);
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.4s;
    }
    .hero-slider-box:hover {
      transform: scale(1.01) translateY(-5px);
      box-shadow: 0 25px 40px rgba(0,201,183,0.4);
    }
    .slider-track {
      display: flex;
      width: fit-content;
      animation: slideRight 24s linear infinite;
    }
    .slider-track img {
      width: 650px;            /* sync with box width */
      height: 360px;
      object-fit: cover;
      flex-shrink: 0;
      border-right: 2px solid rgba(0,201,183,0.2);
    }
    @keyframes slideRight {
      0% { transform: translateX(0); }
      100% { transform: translateX(-4550px); } /* 7 images * 650px = 4550 */
    }

    /* --------------------------------------
       HERO SECTION (left postcard)
    -------------------------------------- */
    .hero-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      margin-bottom: 3rem;
    }
    .hero-postcard {
      background: rgba(26, 33, 53, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 3rem 2.8rem;
      border: 1px solid rgba(0, 201, 183, 0.2);
      box-shadow: var(--shadow-lg);
      animation: postcardReveal 1.2s ease;
    }
    .hero-postcard h1 {
      font-size: 3.4rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 1rem 0 1.2rem;
    }
    .postcard-icon {
      width: 60px;
      height: 60px;
      background: var(--gradient-1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-glow);
    }
    .postcard-icon i { font-size: 2.2rem; color: white; }

    .hero-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .stat-postcard {
      background: rgba(0, 201, 183, 0.1);
      padding: 1.2rem 0.5rem;
      border-radius: 25px;
      text-align: center;
      border: 1px solid rgba(0, 201, 183, 0.3);
      transition: 0.2s;
    }
    .stat-postcard:hover {
      background: rgba(0, 201, 183, 0.25);
      transform: translateY(-5px);
    }
    .stat-postcard .number {
      display: block;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary-1);
    }

    /* --------------------------------------
       POSTCARDS GRID (global)
    -------------------------------------- */
    .postcard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.5rem;
      margin: 3rem 0;
    }
    .postcard {
      background: rgba(26, 33, 53, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(0, 201, 183, 0.2);
      transition: 0.4s;
    }
    .postcard:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 25px 45px rgba(0, 201, 183, 0.5);
    }

    /* about section postcards */
    .about-postcard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-top: 3rem;
    }
    .about-main-postcard {
      background: rgba(26, 33, 53, 0.9);
      border-radius: 40px;
      padding: 3rem;
      border: 1px solid rgba(0, 201, 183, 0.2);
    }
    .feature-postcards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-top: 2.5rem;
      color: #08a6f0;
    }
    .mini-postcard {
      background: rgba(18, 122, 219, 0.1);
      padding: 1.5rem 1rem;
      border-radius: 25px;
      text-align: center;
      transition: 0.2s;
    }
    .mini-postcard:hover {
      background:#12eb36fd;
      transform: scale(1.03);
    }

    /* service cards */
    .services-postcard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }
    .service-postcard {
      background: rgba(26, 33, 53, 0.9);
      border-radius: 35px;
      overflow: hidden;
      border: 1px solid rgba(0, 201, 183, 0.2);
      transition: 0.4s;
      cursor: pointer;
    }
    .service-postcard:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 40px rgba(0, 201, 183, 0.5);
    }
    .service-header {
      height: 150px;
      background: var(--gradient-1);
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .service-header i { font-size: 3.2rem; color: white; }
    .service-header h3 { font-size: 2rem; color: white; }
    .service-body { padding: 2rem; }
    .service-price { font-size: 2.3rem; font-weight: 800; color: var(--primary-1); }

    /* contact gps & details */
    .contact-postcard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-top: 3rem;
    }
    .contact-info-postcard {
      background: rgba(26, 33, 53, 0.9);
      border-radius: 40px;
      padding: 3rem;
      border: 1px solid rgba(0, 201, 183, 0.2);
    }
    .gps-postcard {
      background: rgba(0, 201, 183, 0.15);
      border-radius: 30px;
      padding: 1.8rem;
      margin: 2rem 0;
      display: flex;
      align-items: center;
      gap: 2rem;
      border: 1px solid var(--primary-1);
      cursor: pointer;
      transition: 0.2s;
    }
    .gps-postcard:hover {
      transform: scale(1.04);
      box-shadow: 0 0 30px #00c9b7;
    }
    .contact-detail-postcard {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.2rem 1.5rem;
      background: rgba(255,255,255,0.03);
      border-radius: 25px;
      margin: 1rem 0;
      cursor: pointer;
      transition: 0.2s;
    }
    .contact-detail-postcard:hover {
      background: rgba(0,201,183,0.15);
      transform: translateX(8px);
      box-shadow: 0 0 20px #00c9b7;
    }
    .form-postcard {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .form-postcard input, .form-postcard textarea {
      background: transparent;
      border: none;
      outline: none;
      color: var(--light-1);
      width: 100%;
      font-size: 1rem;
    }
    .submit-postcard {
      width: 100%;
      padding: 1.3rem;
      background: var(--gradient-1);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .submit-postcard:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-glow);
    }

    /* footer postcards */
    .footer-postcards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      margin-top: 4rem;
    }
    .footer-postcard {
      background: rgba(26,33,53,0.9);
      border-radius: 25px;
      padding: 2rem;
      border: 1px solid rgba(0,201,183,0.2);
    }

    /* responsiveness */
    @media (max-width: 1100px) {
      .hero-section { grid-template-columns: 1fr; }
      .hero-slider-box { max-width: 100%; }
      .about-postcard-grid, .contact-postcard-grid { grid-template-columns: 1fr; }
      .footer-postcards { grid-template-columns: repeat(2,1fr); }
    }
    
    /* ===== FIXED MOBILE BUTTON STYLES ===== */
    @media (max-width: 700px) {
      .nav-links { display: none; }
      .nav-right { gap: 0.5rem; }
      .call-pill .phone-number { font-size: 1rem; }
      .footer-postcards { grid-template-columns: 1fr; }
      .hero-postcard h1 { font-size: 2.5rem; }
      
      /* Fix for hero section buttons */
      .hero-postcard {
        padding: 2rem 1.5rem;
      }
      
      .hero-postcard > div:last-child {
        flex-direction: column !important;
        gap: 1rem !important;
        width: 100%;
      }
      
      .glow-btn {
        width: 100% !important;
        text-align: center;
        padding: 15px 20px !important;
        font-size: 16px !important;
        display: block !important;
      }
      
      .quote-wrapper {
        width: 100%;
        display: block !important;
      }
      
      .quote-wrapper a {
        width: 100%;
        display: block !important;
      }
      
      .btn-cont {
        width: 100%;
        display: block !important;
      }
      
      .btn-cont a {
        width: 100%;
        display: block !important;
        text-align: center;
      }
      
      /* Fix for any inline styles */
      [style*="display:flex"] {
        flex-wrap: wrap;
      }
    }
    
    .glow-btn{
      position: relative;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg,hsl(221, 100%, 50%),#4facfe);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      overflow: hidden;
      transition: 0.4s ease;
      letter-spacing: 1px;
      width:85%;
    }

    /* ⭐ Glow shadow */
    .glow-btn:hover{
      transform: translateY(-5px) scale(1.05);
      box-shadow: 
        0 0 15px hsl(212, 100%, 50%),
        0 0 30px #7bfe00,
        0 0 60px #4facfe;
    }

    /* ⭐ Smooth gradient movement */
    @keyframes glowing{
      0%{background-position:0 0;}
      50%{background-position:300% 0;}
      100%{background-position:0 0;}
    }
    
    /* ⭐ QUOTE BUTTON */
    .quote-wrapper{
      position:relative;
      display:inline-block;
    }

    .quote-btn{
      padding:14px 30px;
      border-radius:30px;
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg,#00f2fe,#4facfe);
      color:white;
      font-size:16px;
      transition:0.3s;
    }

    .quote-btn:hover{
      transform:scale(1.1);
      box-shadow:0 0 20px cyan,0 0 40px #00f2fe;
    }

    /* ⭐ Hover Preview */
    .quote-preview{
      position:absolute;
      bottom:120%;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.85);
      padding:15px;
      border-radius:15px;
      width:220px;
      font-size:13px;
      opacity:0;
      visibility:hidden;
      transition:0.3s;
      box-shadow:0 0 20px cyan;
    }

    .quote-wrapper:hover .quote-preview{
      opacity:1;
      visibility:visible;
    }

    .quote-preview ul{
      padding-left:15px;
      text-align:left;
    }

    /* ⭐ POPUP */
    .quote-popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .quote-box{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      padding:30px;
      width:90%;
      max-width:400px;
      border-radius:20px;
      text-align:center;
      animation:fadeIn 0.4s ease;
    }

    .step{display:none;}
    .step.active{display:block;}

    .quote-box input,
    .quote-box select{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      border:none;
    }

    .close-btn{
      float:right;
      cursor:pointer;
    }

    /* ⭐ Progress Bar */
    .progress-bar{
      height:5px;
      background:#333;
      margin-bottom:15px;
      border-radius:10px;
      overflow:hidden;
    }

    #progress{
      height:5px;
      width:25%;
      background:cyan;
      transition:0.3s;
    }

    /* ⭐ Mobile */
    @media(max-width:768px){
      .quote-box{
        width:95%;
      }
    }
    
    /* Make wrapper behave like normal button */
    .quote-wrapper.same-line{
      display:inline-block;
      position:relative;
      vertical-align:middle;
    }

    /* If buttons are inside flex container */
    .button-group{
      display:flex;
      gap:15px;
      align-items:center;
      justify-content:center;
    }
    
    /* ⭐ AI Chatbox Container */
    .ai-chatbox{
      position:fixed;
      bottom:100px;
      right:25px;
      width:320px;
      max-height:450px;
      background:rgba(0,0,0,0.92);
      backdrop-filter:blur(15px);
      border-radius:20px;
      display:none;
      flex-direction:column;
      overflow:hidden;
      box-shadow:0 0 25px cyan;
      z-index:9999;
      animation:fadeIn 0.3s ease;
    }

    /* Header */
    .ai-header{
      background:linear-gradient(135deg,#00f2fe,#4facfe);
      padding:12px;
      color:white;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
    }

    /* Body */
    .ai-body{
      padding:15px;
      overflow-y:auto;
      font-size:14px;
      color:white;
    }

    .ai-bot{
      background:#222;
      padding:10px;
      border-radius:12px;
      margin-bottom:10px;
    }

    /* Option Buttons */
    .ai-options button{
      width:100%;
      margin:5px 0;
      padding:8px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:linear-gradient(135deg,#00f2fe,#4facfe);
      color:black;
      font-weight:600;
      transition:0.3s;
    }

    .ai-options button:hover{
      transform:scale(1.05);
    }
    
    .btn-cont {
      display: inline-block;
    }
